<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Democracy Routes Video</title>
    <style>
      :root {
        --ink: #111827;
        --muted: #526079;
        --paper: #f8f5ef;
        --panel: rgba(255, 255, 255, 0.8);
        --line: rgba(17, 24, 39, 0.12);
        --line-strong: rgba(17, 24, 39, 0.24);
        --accent: #f97316;
        --accent-press: #c2410c;
        --danger: #be123c;
        --shadow: rgba(15, 23, 42, 0.14);
        --call-top-overlay: 72px;
        --call-bottom-overlay: 112px;
        --transcript-panel-width: min(360px, 34vw);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background: radial-gradient(circle at 10% 12%, #ffe6bf, transparent 45%),
          radial-gradient(circle at 85% 4%, #dff2ff, transparent 45%),
          linear-gradient(180deg, #fffdf8 0%, #f2ede2 100%);
        min-height: 100vh;
        -webkit-text-size-adjust: 100%;
      }

      body.embed-mode {
        background: transparent;
        overflow: hidden;
      }

      .app {
        max-width: 1300px;
        margin: 0 auto;
        min-height: 100vh;
        padding: 16px 14px calc(110px + env(safe-area-inset-bottom, 0px));
      }

      body.embed-mode .app {
        max-width: none;
        margin: 0;
        padding: 0 0 calc(92px + env(safe-area-inset-bottom, 0px));
      }

      body.embed-mode.hide-dock .app {
        padding: 0;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(12px);
        box-shadow: 0 24px 60px var(--shadow);
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 14px;
      }

      .brand {
        font-size: 16px;
        font-weight: 700;
      }

      .brand span {
        color: #1d4ed8;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: var(--muted);
        padding: 6px 12px;
        font-size: 12px;
      }

      #roomBadge {
        color: #0f172a;
        border-color: var(--line-strong);
        font-weight: 600;
      }

      #inviteBtn {
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 12px;
      }

      #lobbyPanel {
        margin-top: 12px;
        padding: 16px;
      }

      .lobby-grid {
        display: grid;
        grid-template-columns: 1.2fr 1fr;
        gap: 14px;
      }

      .lobby-title {
        margin: 2px 0 4px;
        font-size: 24px;
        font-weight: 700;
      }

      .lobby-text {
        margin: 0 0 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .field-row,
      .device-row,
      .join-row {
        display: grid;
        gap: 8px;
      }

      .field-row {
        grid-template-columns: 1fr auto;
      }

      .join-row {
        grid-template-columns: 1fr;
        margin-top: 8px;
      }

      .device-row {
        margin-top: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .label {
        margin: 12px 0 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input,
      select,
      button {
        border: 1px solid var(--line);
        border-radius: 12px;
        font-family: inherit;
        font-size: 14px;
        padding: 10px 12px;
        color: var(--ink);
        background: rgba(255, 255, 255, 0.92);
        touch-action: manipulation;
      }

      input::placeholder {
        color: #7b879b;
      }

      select {
        appearance: none;
      }

      button {
        cursor: pointer;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .btn-primary {
        border-color: transparent;
        background: var(--accent);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--accent-press);
      }

      .btn-outline {
        background: rgba(255, 255, 255, 0.95);
      }

      .preview {
        display: flex;
        flex-direction: column;
        min-height: 300px;
      }

      .preview-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }

      .preview video {
        width: 100%;
        border-radius: 14px;
        background: #0f172a;
        aspect-ratio: 16 / 10;
        object-fit: cover;
      }

      .auto-rec {
        margin-top: 10px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .transcription-row {
        margin-top: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .transcription-row select {
        min-width: 170px;
        padding: 8px 10px;
        font-size: 12px;
      }

      #callShell {
        margin-top: 12px;
      }

      .hidden {
        display: none !important;
      }

      .call-grid {
        display: grid;
        grid-template-columns: 1fr 300px;
        gap: 12px;
      }

      .stage {
        position: relative;
        padding: 12px;
      }

      .tiles {
        display: grid;
        --grid-cols: 2;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 10px;
      }

      .tiles.mode-auto[data-count="1"] {
        grid-template-columns: 1fr;
      }

      .tiles.mode-auto[data-count="2"] {
        grid-template-columns: 1fr 1fr;
      }

      .tiles.mode-grid {
        grid-template-columns: repeat(var(--grid-cols), minmax(0, 1fr));
      }

      .tiles.mode-speaker {
        grid-template-columns: repeat(12, minmax(0, 1fr));
        grid-auto-rows: minmax(86px, auto);
        align-items: stretch;
      }

      .tiles.mode-speaker .tile {
        opacity: 0.94;
      }

      .tiles.mode-speaker .tile.active-speaker {
        grid-column: 1 / span 9;
        grid-row: 1 / span 5;
        opacity: 1;
        min-height: 420px;
      }

      .tiles.mode-speaker .tile.secondary-speaker {
        grid-column: 10 / span 3;
        min-height: 110px;
      }

      .tile {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.92);
        overflow: hidden;
      }

      .tile-meta {
        font-size: 12px;
        color: #3f4d66;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .tile video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #0f172a;
        object-fit: cover;
        display: block;
      }

      .transcript-box {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px;
      }

      .transcript-header {
        font-size: 12px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #526079;
        margin-bottom: 6px;
      }

      .transcript-live {
        font-size: 13px;
        color: #334155;
        min-height: 18px;
        margin-top: 6px;
      }

      .transcript-lines {
        display: flex;
        flex-direction: column;
        gap: 4px;
        max-height: 220px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-gutter: stable;
        padding-right: 4px;
      }

      .transcript-line {
        font-size: 13px;
        line-height: 1.35;
        color: #0f172a;
      }

      .chat-box {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        padding: 10px;
        display: none;
        flex-direction: column;
        gap: 8px;
        min-height: 180px;
      }

      .chat-header {
        font-size: 12px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        color: #526079;
      }

      .chat-messages {
        flex: 1 1 auto;
        min-height: 90px;
        max-height: 220px;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-gutter: stable;
        padding-right: 4px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .chat-line {
        font-size: 13px;
        line-height: 1.35;
        color: #0f172a;
        word-break: break-word;
      }

      .chat-author {
        font-weight: 700;
      }

      .chat-compose {
        display: flex;
        gap: 6px;
      }

      .chat-input {
        flex: 1 1 auto;
        min-width: 0;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
        padding: 8px 10px;
        font-size: 13px;
      }

      .chat-send {
        flex: 0 0 auto;
      }

      .panel {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .panel-title {
        margin: 0;
        font-size: 14px;
      }

      .participants {
        margin: 0;
        padding: 0;
        list-style: none;
        max-height: 210px;
        overflow: auto;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
      }

      .participants li {
        padding: 9px 10px;
        font-size: 13px;
        border-bottom: 1px solid var(--line);
      }

      .participants li:last-child {
        border-bottom: 0;
      }

      .logs {
        min-height: 180px;
        max-height: 260px;
        overflow: auto;
        white-space: pre-wrap;
        font-size: 12px;
        line-height: 1.45;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.86);
        padding: 10px;
        color: #334155;
      }

      body.embed-mode .header,
      body.embed-mode #lobbyPanel,
      body.embed-mode .panel {
        display: none !important;
      }

      body.embed-mode #callShell {
        margin-top: 0;
        height: 100vh;
      }

      body.embed-mode .call-grid {
        grid-template-columns: 1fr;
        height: 100%;
      }

      body.embed-mode .stage {
        height: calc(100vh - 90px);
        padding: 8px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
      }

      body.embed-mode.hide-dock .stage {
        height: 100vh;
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }

      body.embed-mode .tiles {
        height: 100%;
      }

      body.embed-mode .dock {
        left: 8px;
        right: 8px;
        bottom: 8px;
        transform: none;
        width: auto;
      }

      body.embed-mode.hide-dock .dock {
        display: none !important;
      }

      body.in-call {
        overflow: hidden;
      }

      body.in-call .app {
        max-width: none;
        padding: 0;
        min-height: 0;
      }

      body.in-call #callShell {
        margin-top: 0 !important;
        position: fixed;
        inset: 0;
        z-index: 5;
      }

      body.in-call .call-grid {
        grid-template-columns: 1fr;
        height: 100%;
        gap: 0;
      }

      body.in-call .stage {
        height: 100%;
        padding-top: 8px;
        padding-right: 8px;
        padding-bottom: 8px;
        padding-left: 8px;
        border: none;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        min-height: 0;
      }

      body.in-call.transcript-open .stage {
        padding-right: calc(var(--transcript-panel-width) + 8px);
      }

      body.in-call .tiles {
        height: 100%;
        min-height: 0;
        align-content: stretch;
        grid-auto-rows: minmax(0, 1fr);
      }

      body.in-call .tile {
        height: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      body.in-call .tile video {
        flex: 1 1 auto;
        width: 100%;
        height: 100%;
        min-height: 0;
        aspect-ratio: auto;
        object-fit: contain;
        object-position: center center;
        background: #0f172a;
      }

      body.embed-mode.in-call .tile video {
        object-fit: cover;
      }

      body.embed-mode .tile video {
        height: 100%;
        object-fit: cover;
      }

      body.in-call .tiles.mode-auto[data-count="1"] {
        grid-template-columns: 1fr;
        grid-auto-rows: 1fr;
      }

      body.in-call .tiles.mode-speaker {
        grid-template-columns: repeat(12, minmax(0, 1fr));
        grid-auto-rows: minmax(0, 1fr);
      }

      body.in-call .tiles.mode-speaker .tile.active-speaker,
      body.in-call .tiles.mode-speaker .tile.secondary-speaker {
        min-height: 0;
      }

      body.in-call .panel {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: var(--transcript-panel-width);
        z-index: 38;
        display: block;
        padding-top: calc(var(--call-top-overlay) + 8px);
        padding-right: 10px;
        padding-bottom: calc(var(--call-bottom-overlay) + env(safe-area-inset-bottom, 0px));
        padding-left: 10px;
        border-radius: 0;
        border-left: 1px solid rgba(15, 23, 42, 0.16);
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
        box-shadow: -8px 0 24px rgba(15, 23, 42, 0.12);
      }

      body.in-call:not(.transcript-open) .panel {
        display: none !important;
      }

      body.in-call .panel-title,
      body.in-call .participants,
      body.in-call .logs {
        display: none !important;
      }

      body.in-call .transcript-box {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
      }

      body.in-call .transcript-lines {
        flex: 1 1 auto;
        max-height: none;
      }

      body.in-call.chat-open .transcript-box {
        flex: 0 0 52%;
        min-height: 0;
      }

      body.in-call.chat-open .chat-box {
        display: flex;
        flex: 1 1 48%;
        min-height: 0;
      }

      body.in-call.chat-open .chat-messages {
        max-height: none;
      }

      body.in-call .header {
        position: fixed;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 35;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.68);
        backdrop-filter: blur(10px);
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .dock {
        position: fixed;
        left: 50%;
        bottom: 14px;
        transform: translateX(-50%);
        z-index: 90;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(12px);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
        transition: opacity 180ms ease, box-shadow 180ms ease;
      }

      .dock .btn-outline {
        background: rgba(255, 255, 255, 0.96);
        border-color: rgba(15, 23, 42, 0.26);
        color: #0f172a;
      }

      .dock .btn-outline:hover {
        background: #ffffff;
        border-color: rgba(15, 23, 42, 0.42);
      }

      .dock-group {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.85);
      }

      body.in-call .dock {
        background: rgba(15, 23, 42, 0.72);
        border-color: rgba(255, 255, 255, 0.34);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.35);
      }

      body.in-call .dock-group {
        background: rgba(255, 255, 255, 0.22);
        border-color: rgba(255, 255, 255, 0.34);
      }

      body.in-call .dock .btn-outline {
        background: rgba(255, 255, 255, 0.34);
        border-color: rgba(255, 255, 255, 0.52);
        color: #ffffff;
      }

      body.in-call .dock .btn-outline:hover {
        background: rgba(255, 255, 255, 0.5);
        border-color: rgba(255, 255, 255, 0.7);
      }

      body.in-call .dock .btn-danger {
        background: rgba(190, 18, 60, 0.55);
        border-color: rgba(255, 255, 255, 0.5);
        color: #fff;
      }

      .dock.auto-hide.is-hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateX(-50%) translateY(8px);
      }

      .header.auto-hide.is-hidden {
        opacity: 0;
        pointer-events: none;
        transform: translateY(-8px);
      }

      .dock button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-width: 0;
      }

      .dock-btn {
        min-width: 46px;
        width: 46px;
        min-height: 46px;
        height: 46px;
        padding: 8px;
      }

      .dock-device-wrap {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 4px 8px;
        background: rgba(255, 255, 255, 0.95);
      }

      .dock-control-with-device {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        position: relative;
      }

      .dock-control-with-device .dock-btn {
        min-width: 46px;
      }

      .dock-btn.with-gear {
        position: relative;
        min-width: 76px;
        width: 76px;
        padding-right: 34px;
      }

      .dock-btn .gear-suffix {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 6px;
        border: 1px solid rgba(15, 23, 42, 0.34);
        background: rgba(255, 255, 255, 0.95);
        color: inherit;
        cursor: pointer;
      }

      body.in-call .dock-btn .gear-suffix {
        border-color: rgba(255, 255, 255, 0.56);
        background: rgba(15, 23, 42, 0.5);
        color: #fff;
      }

      .dock button:disabled {
        opacity: 0.5;
      }

      .dock-btn .gear-suffix svg {
        width: 12px;
        height: 12px;
      }

      .dock-device-mini {
        width: 34px;
        min-width: 34px;
        height: 34px;
        padding: 0;
      }

      .dock-device-popover {
        position: absolute;
        bottom: calc(100% + 8px);
        left: 0;
        min-width: 210px;
        padding: 6px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.18);
      }

      .dock-device-popover.hidden {
        display: none !important;
      }

      .dock-device-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted);
        text-transform: uppercase;
      }

      .dock select {
        min-width: 190px;
        border-radius: 10px;
        border: none;
        padding: 7px 8px;
        font-size: 12px;
        background: transparent;
      }

      .ctrl-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .ctrl-icon svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .ctrl-label {
        display: none;
      }

      .btn-danger {
        border-color: rgba(190, 18, 60, 0.22);
        color: var(--danger);
      }

      @media (max-width: 1080px) {
        .lobby-grid,
        .call-grid {
          grid-template-columns: 1fr;
        }

        .panel {
          display: grid;
          grid-template-columns: 1fr 1fr;
          align-items: start;
        }

        .panel .panel-title {
          grid-column: span 1;
        }

        .participants,
        .logs {
          max-height: 220px;
        }

        .tiles.mode-speaker {
          grid-template-columns: 1fr;
          grid-auto-rows: auto;
        }

        .tiles.mode-speaker .tile {
          grid-column: auto;
          grid-row: auto;
          opacity: 1;
          min-height: 0;
        }

        .tiles.mode-speaker .tile.active-speaker {
          min-height: 280px;
        }
      }

      @media (max-width: 760px) {
        :root {
          --call-top-overlay: 64px;
          --call-bottom-overlay: 100px;
        }

        .app {
          padding: 10px 10px calc(118px + env(safe-area-inset-bottom, 0px));
        }

        .header {
          padding: 9px 10px;
          flex-direction: column;
          align-items: flex-start;
        }

        body.in-call .header {
          flex-direction: row;
          align-items: center;
          padding: 8px 10px;
        }

        body.in-call .header-right {
          width: auto;
        }

        .header-right {
          width: 100%;
          flex-wrap: wrap;
        }

        .badge {
          font-size: 11px;
          padding: 6px 10px;
        }

        #lobbyPanel {
          padding: 12px;
        }

        .lobby-title {
          font-size: 20px;
        }

        .lobby-text {
          font-size: 13px;
          margin-bottom: 12px;
        }

        input,
        select,
        button {
          font-size: 16px;
        }

        .preview {
          min-height: 0;
        }

        .preview-head {
          flex-wrap: wrap;
          gap: 6px;
        }

        .auto-rec {
          display: flex;
          width: 100%;
        }

        .transcription-row {
          width: 100%;
          flex-wrap: wrap;
        }

        .transcription-row select {
          width: 100%;
          min-width: 0;
        }

        .field-row,
        .device-row {
          grid-template-columns: 1fr;
        }

        .call-grid {
          gap: 8px;
        }

        .stage {
          padding: 8px;
        }

        .tiles {
          grid-template-columns: repeat(auto-fill, minmax(142px, 1fr));
          gap: 8px;
        }

        .tile video {
          aspect-ratio: 16 / 10;
        }

        body.in-call .tile video {
          aspect-ratio: auto;
        }

        .panel {
          display: block;
          padding: 10px;
        }

        body.in-call .panel {
          top: auto;
          right: 10px;
          left: 10px;
          bottom: calc(var(--call-bottom-overlay) + env(safe-area-inset-bottom, 0px));
          width: auto;
          height: min(34vh, 280px);
        }

        body.in-call.transcript-open .stage {
          padding-right: 8px;
          padding-bottom: calc(var(--call-bottom-overlay) + min(34vh, 280px) + 8px);
        }

        .participants {
          max-height: 140px;
        }

        .logs {
          min-height: 110px;
          max-height: 160px;
        }

        .dock {
          width: calc(100% - 20px);
          left: 10px;
          right: 10px;
          bottom: calc(8px + env(safe-area-inset-bottom, 0px));
          transform: none;
          flex-wrap: nowrap;
          justify-content: flex-start;
          overflow-x: auto;
          overflow-y: visible;
          -webkit-overflow-scrolling: touch;
          gap: 6px;
          padding: 8px;
          border-radius: 14px;
        }

        .dock-group {
          width: auto;
          justify-content: flex-start;
          flex-wrap: nowrap;
          flex: 0 0 auto;
          gap: 6px;
        }

        .dock-control-with-device {
          width: auto;
          min-width: 0;
          flex-wrap: nowrap;
          flex: 0 0 auto;
        }

        .dock-device-popover {
          left: auto;
          right: 0;
          min-width: 170px;
          width: 100%;
        }

        .dock select {
          min-width: 120px;
          width: 100%;
        }

        .dock-btn {
          flex: 0 0 auto;
          min-width: 44px;
          width: 44px;
          min-height: 44px;
          height: 44px;
          justify-content: center;
          padding: 8px;
        }

        .dock-device-mini {
          width: 42px;
          min-width: 42px;
          height: 42px;
        }

        .transcript-lines {
          max-height: 180px;
        }

        .dock-btn.with-gear {
          min-width: 72px;
          width: 72px;
        }
      }

      @media (max-width: 420px) {
        .brand {
          font-size: 14px;
        }

        .dock-control-with-device {
          width: auto;
        }

        .dock-device-popover {
          min-width: 0;
          width: 100%;
        }

      }

      html.pre-autojoin #lobbyPanel {
        display: none !important;
      }

      html.pre-autojoin #callShell {
        display: block !important;
      }
    </style>
    <script>
      (function () {
        try {
          var url = new URL(window.location.href);
          var autojoin = String(url.searchParams.get("autojoin") || "").toLowerCase();
          var hasAutojoin = autojoin === "1" || autojoin === "true" || autojoin === "yes";
          var hasRoomInPath = /\/meet\/[^/?#]+/i.test(window.location.pathname || "");
          var hasName = Boolean((url.searchParams.get("name") || url.searchParams.get("user") || "").trim());
          if (hasAutojoin && hasRoomInPath && hasName) {
            document.documentElement.classList.add("pre-autojoin");
          }
        } catch {}
      })();
    </script>
  </head>
  <body>
    <main class="app">
      <header class="card header">
        <div class="brand">Democracy<span>Routes</span> Video</div>
        <div class="header-right">
          <span id="status" class="badge">Disconnected</span>
          <span id="roomBadge" class="badge">No room</span>
          <button id="inviteBtn" type="button" class="btn-outline hidden">Invite</button>
        </div>
      </header>

      <section id="lobbyPanel" class="card">
        <div class="lobby-grid">
          <div>
            <h1 class="lobby-title">Join a room</h1>
            <p class="lobby-text">Create a room instantly or join an existing one with your name and selected devices.</p>

            <div id="roomJoinBlock">
              <div class="label">Room</div>
              <div class="field-row">
                <input id="room" placeholder="e.g. civic-bridge-452" />
                <button id="generateRoom" class="btn-outline" type="button">Generate</button>
              </div>
            </div>

            <div id="nameJoinBlock">
              <div class="label">Your name</div>
              <input id="name" placeholder="Your display name" />
            </div>

            <div class="label">Devices</div>
            <div class="device-row">
              <select id="audioDevice"></select>
              <select id="videoDevice"></select>
            </div>

            <div id="autoRecordJoinBlock">
              <div class="auto-rec">
                <input id="autoRecordVideo" type="checkbox" checked />
                <label for="autoRecordVideo">Auto record video+audio on join</label>
              </div>
              <div class="auto-rec">
                <input id="autoRecordAudio" type="checkbox" />
                <label for="autoRecordAudio">Auto record audio-only on join</label>
              </div>
            </div>
            <div id="transcriptionJoinBlock" class="transcription-row">
              <input id="transcriptionEnabled" type="checkbox" />
              <label for="transcriptionEnabled">Enable live transcription</label>
              <select id="transcriptionLanguageInput" disabled>
                <option value="en">English (EN)</option>
                <option value="it">Italian (IT)</option>
                <option value="es">Spanish (ES)</option>
                <option value="fr">French (FR)</option>
                <option value="de">German (DE)</option>
                <option value="pt">Portuguese (PT)</option>
                <option value="nl">Dutch (NL)</option>
                <option value="tr">Turkish (TR)</option>
                <option value="hi">Hindi (HI)</option>
                <option value="ja">Japanese (JA)</option>
                <option value="ko">Korean (KO)</option>
                <option value="ar">Arabic (AR)</option>
                <option value="ru">Russian (RU)</option>
                <option value="multi">Multilingual</option>
              </select>
            </div>

            <div class="join-row">
              <button id="join" class="btn-primary" type="button">Join meeting</button>
            </div>
          </div>

          <div class="preview">
            <div class="preview-head">
              <span>Camera preview</span>
              <button id="leave" type="button" class="btn-outline">Leave meeting</button>
            </div>
            <video id="previewVideo" autoplay playsinline muted></video>
          </div>
        </div>
      </section>

      <section id="callShell" class="hidden">
        <div class="call-grid">
          <section class="card stage">
            <div id="videos" class="tiles"></div>
          </section>

          <aside class="card panel">
            <h3 class="panel-title">Participants (<span id="participantCount">0</span>)</h3>
            <ul id="participantList" class="participants"></ul>
            <section id="transcriptBox" class="transcript-box" aria-live="polite" aria-atomic="false">
              <div class="transcript-header">Live transcription</div>
              <div id="transcriptLines" class="transcript-lines"></div>
              <div id="transcriptLive" class="transcript-live">Transcription off</div>
            </section>
            <section id="chatBox" class="chat-box" aria-live="polite" aria-atomic="false">
              <div class="chat-header">Room chat</div>
              <div id="chatMessages" class="chat-messages"></div>
              <div class="chat-compose">
                <input id="chatInput" class="chat-input" type="text" maxlength="800" placeholder="Write a message..." />
                <button id="chatSend" class="btn-outline chat-send" type="button">Send</button>
              </div>
            </section>
            <pre id="logs" class="logs hidden"></pre>
          </aside>
        </div>
      </section>

      <div id="dock" class="dock">
        <div class="dock-group">
          <button id="viewToggle" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">View: Auto</span></button>
          <button id="transcriptToggle" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Transcription</span></button>
          <button id="chatToggle" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Chat</span></button>
        </div>
        <div class="dock-group">
          <div class="dock-control-with-device">
            <button id="micToggle" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Mute mic</span></button>
            <div id="micDevicePopover" class="dock-device-popover hidden">
              <label class="dock-device-wrap" for="dockAudioDevice">
                <span class="dock-device-label">Mic</span>
                <select id="dockAudioDevice"></select>
              </label>
            </div>
          </div>
          <div class="dock-control-with-device">
            <button id="camToggle" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Disable cam</span></button>
            <div id="camDevicePopover" class="dock-device-popover hidden">
              <label class="dock-device-wrap" for="dockVideoDevice">
                <span class="dock-device-label">Cam</span>
                <select id="dockVideoDevice"></select>
              </label>
            </div>
          </div>
          <button id="toggleRecAudio" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Record audio</span></button>
          <button id="toggleRecVideo" type="button" class="dock-btn btn-outline"><span class="ctrl-icon"></span><span class="ctrl-label">Record video+audio</span></button>
          <button id="dockLeave" type="button" class="dock-btn btn-danger"><span class="ctrl-icon"></span><span class="ctrl-label">Leave</span></button>
        </div>
      </div>

      <div class="hidden">
        <button id="dockMic" type="button">dock mic</button>
        <button id="dockCam" type="button">dock cam</button>
        <button id="dockRecAudio" type="button">dock rec audio</button>
        <button id="dockRecVideo" type="button">dock rec video</button>
      </div>
    </main>

    <script type="module">
      const __drVideoBasePath =
        location.pathname.startsWith("/video/") || location.pathname === "/video"
          ? "/video"
          : "";
      import(`${__drVideoBasePath}/app.js`);
    </script>
  </body>
</html>
