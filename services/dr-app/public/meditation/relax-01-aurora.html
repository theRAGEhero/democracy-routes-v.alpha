<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relax Aurora</title>
  <style>
    :root{
      --bg1:#050b1a;
      --bg2:#0c1f2e;
      --bg3:#081b14;
      --glow:#7cf7d4;
      --glow2:#6ecbff;
      --text: rgba(255,255,255,.78);
    }
    html,body{height:100%;margin:0}
    body{
      overflow:hidden;
      background: radial-gradient(900px 700px at 15% 20%, rgba(124,247,212,.18), transparent 60%),
                  radial-gradient(800px 600px at 85% 10%, rgba(110,203,255,.16), transparent 60%),
                  linear-gradient(140deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 200% 200%;
      animation: drift 22s ease-in-out infinite;
      font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
      color: var(--text);
    }
    @keyframes drift{
      0%{background-position: 0% 40%}
      50%{background-position: 100% 60%}
      100%{background-position: 0% 40%}
    }
    canvas{position:fixed;inset:0;display:block}
    .ui{
      position:fixed;
      left:20px; bottom:18px;
      display:flex; gap:12px; align-items:center;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(6,10,14,.4);
      backdrop-filter: blur(10px);
      border-radius:14px;
      box-shadow: 0 10px 40px rgba(0,0,0,.3);
      user-select:none;
    }
    .ui label{font-size:12px;letter-spacing:.2px}
    .ui input[type="range"]{width:150px}
    .ui button{
      border:1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.9);
      font-size:12px;
      padding:6px 10px;
      border-radius:10px;
      cursor:pointer;
    }
    .ui button:disabled{opacity:.6; cursor:default}
    #micLevel{font-size:12px;opacity:.8}
    .hint{
      position:fixed;
      right:20px; top:18px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(6,10,14,.35);
      backdrop-filter: blur(10px);
      border-radius:14px;
      font-size:12px;
      line-height:1.35;
      max-width: 240px;
    }
    .hint b{color: rgba(255,255,255,.9)}
  
    .ui, .hint { display: none; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hint">
    <b>Aurora Drift</b><br/>
    Enable the microphone and speak softly.<br/>
    Press <b>Space</b> to pause.
  </div>

  <div class="ui">
    <label>Calm</label>
    <input id="calm" type="range" min="0" max="100" value="65" />
    <label id="label">65%</label>
    <button id="mic">Enable Mic</button>
    <span id="micLevel" aria-hidden="true">Mic: 0</span>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    const calmSlider = document.getElementById("calm");
    const calmLabel  = document.getElementById("label");
    const micButton = document.getElementById("mic");
    const micMeter = document.getElementById("micLevel");

    let W=0,H=0, DPR=1;
    function resize(){
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    window.addEventListener("resize", resize);
    resize();

    let micLevel = 0;
    window.addEventListener('message', (event) => {
      if (!event || !event.data || event.data.type !== 'meditation-mic') return;
      const next = Number(event.data.level);
      if (Number.isNaN(next)) return;
      micLevel = Math.max(0, Math.min(1, next));
    });
    let micReady = false;
    let micUnavailable = false;

    async function enableMic(){
      if(micReady || micUnavailable) return;
      try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        const buffer = new Uint8Array(analyser.fftSize);
        function updateMic(){
          analyser.getByteTimeDomainData(buffer);
          let sum = 0;
          for(let i=0;i<buffer.length;i++){
            const v = (buffer[i] - 128) / 128;
            sum += v * v;
          }
          const rms = Math.sqrt(sum / buffer.length);
          const target = Math.min(1, rms * 6.0);
          micLevel += (target - micLevel) * 0.15;
          micMeter.textContent = "Mic: " + Math.round(micLevel * 100);
          requestAnimationFrame(updateMic);
        }
        updateMic();

        micReady = true;
        micButton.textContent = "Mic On";
        micButton.disabled = true;
      }catch(err){
        micUnavailable = true;
        micButton.textContent = "Mic Blocked";
        micButton.disabled = true;
      }
    }

    micButton.addEventListener("click", enableMic);
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      micUnavailable = true;
      micButton.textContent = "Mic Unsupported";
      micButton.disabled = true;
    }

    let paused = false;
    window.addEventListener("keydown", (e)=>{
      if(e.code === "Space"){ paused = !paused; }
    });

    const ribbons = [
      { hue: 165, offset: 0.0 },
      { hue: 195, offset: 1.5 },
      { hue: 210, offset: 2.7 },
      { hue: 150, offset: 3.8 }
    ];

    let t0 = performance.now();
    function frame(now){
      requestAnimationFrame(frame);
      if(paused) return;

      const dt = Math.min(0.033, (now - t0) / 1000);
      t0 = now;

      const calm = Number(calmSlider.value) / 100;
      calmLabel.textContent = Math.round(calm*100) + "%";
      const voice = micLevel;

      ctx.fillStyle = `rgba(3,6,10,${0.1 + (1-calm)*0.08})`;
      ctx.fillRect(0,0,W,H);

      const drift = now * 0.00008;
      for(const r of ribbons){
        const amp = 40 + (1-calm)*20 + voice*120;
        const baseY = H * (0.22 + r.offset*0.12);
        ctx.beginPath();
        for(let x=0;x<=W;x+=30){
          const y = baseY + Math.sin(x*0.008 + drift*10 + r.offset) * amp;
          if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.strokeStyle = `hsla(${r.hue}, 80%, 70%, ${0.15 + voice*0.35})`;
        ctx.lineWidth = 2 + voice*4;
        ctx.shadowColor = `hsla(${r.hue}, 90%, 70%, ${0.35 + voice*0.4})`;
        ctx.shadowBlur = 20 + voice*40;
        ctx.stroke();
      }
      ctx.shadowBlur = 0;

      const breath = (Math.sin(now/1000 * 0.4) + 1) / 2;
      const glow = 40 + breath*30 + voice*70;
      const g = ctx.createRadialGradient(W*0.5, H*0.65, 10, W*0.5, H*0.65, glow);
      g.addColorStop(0, `rgba(124,247,212,${0.25 + voice*0.3})`);
      g.addColorStop(1, "rgba(124,247,212,0)");
      ctx.fillStyle = g;
      ctx.fillRect(0,0,W,H);
    }

    ctx.fillStyle = "rgba(3,6,10,1)";
    ctx.fillRect(0,0,W,H);
    requestAnimationFrame(frame);
  </script>
</body>
</html>
