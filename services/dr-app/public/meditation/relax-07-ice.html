<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Relax Ice</title>
  <style>
    :root{
      --bg1:#061524;
      --bg2:#0b2b3a;
      --bg3:#0b1d2a;
      --text: rgba(255,255,255,.78);
    }
    html,body{height:100%;margin:0}
    body{
      overflow:hidden;
      background: radial-gradient(900px 700px at 20% 20%, rgba(140,220,255,.2), transparent 60%),
                  radial-gradient(800px 600px at 80% 30%, rgba(100,180,255,.18), transparent 60%),
                  linear-gradient(150deg, var(--bg1), var(--bg2), var(--bg3));
      background-size: 200% 200%;
      animation: drift 22s ease-in-out infinite;
      font-family: "Didot", "Bodoni MT", serif;
      color: var(--text);
    }
    @keyframes drift{
      0%{background-position: 0% 40%}
      50%{background-position: 100% 60%}
      100%{background-position: 0% 40%}
    }
    canvas{position:fixed;inset:0;display:block}
    .ui{
      position:fixed;
      left:20px; bottom:18px;
      display:flex; gap:12px; align-items:center;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(8,16,22,.4);
      backdrop-filter: blur(10px);
      border-radius:14px;
      box-shadow: 0 10px 40px rgba(0,0,0,.3);
      user-select:none;
    }
    .ui label{font-size:12px;letter-spacing:.2px}
    .ui input[type="range"]{width:150px}
    .ui button{
      border:1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.9);
      font-size:12px;
      padding:6px 10px;
      border-radius:10px;
      cursor:pointer;
    }
    .ui button:disabled{opacity:.6; cursor:default}
    #micLevel{font-size:12px;opacity:.8}
    .hint{
      position:fixed;
      right:20px; top:18px;
      padding:10px 12px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(8,16,22,.35);
      backdrop-filter: blur(10px);
      border-radius:14px;
      font-size:12px;
      line-height:1.35;
      max-width: 240px;
    }
    .hint b{color: rgba(255,255,255,.9)}
  
    .ui, .hint { display: none; }
</style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="hint">
    <b>Ice Cathedral</b><br/>
    Enable the microphone and speak softly.<br/>
    Press <b>Space</b> to pause.
  </div>

  <div class="ui">
    <label>Calm</label>
    <input id="calm" type="range" min="0" max="100" value="65" />
    <label id="label">65%</label>
    <button id="mic">Enable Mic</button>
    <span id="micLevel" aria-hidden="true">Mic: 0</span>
  </div>

  <script>
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d", { alpha: true });

    const calmSlider = document.getElementById("calm");
    const calmLabel  = document.getElementById("label");
    const micButton = document.getElementById("mic");
    const micMeter = document.getElementById("micLevel");

    let W=0,H=0, DPR=1;
    function resize(){
      DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width  = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + "px";
      canvas.style.height = H + "px";
      ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    window.addEventListener("resize", resize);
    resize();

    let micLevel = 0;
    window.addEventListener('message', (event) => {
      if (!event || !event.data || event.data.type !== 'meditation-mic') return;
      const next = Number(event.data.level);
      if (Number.isNaN(next)) return;
      micLevel = Math.max(0, Math.min(1, next));
    });
    let micReady = false;
    let micUnavailable = false;

    async function enableMic(){
      if(micReady || micUnavailable) return;
      try{
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        const buffer = new Uint8Array(analyser.fftSize);
        function updateMic(){
          analyser.getByteTimeDomainData(buffer);
          let sum = 0;
          for(let i=0;i<buffer.length;i++){
            const v = (buffer[i] - 128) / 128;
            sum += v * v;
          }
          const rms = Math.sqrt(sum / buffer.length);
          const target = Math.min(1, rms * 6.0);
          micLevel += (target - micLevel) * 0.15;
          micMeter.textContent = "Mic: " + Math.round(micLevel * 100);
          requestAnimationFrame(updateMic);
        }
        updateMic();

        micReady = true;
        micButton.textContent = "Mic On";
        micButton.disabled = true;
      }catch(err){
        micUnavailable = true;
        micButton.textContent = "Mic Blocked";
        micButton.disabled = true;
      }
    }

    micButton.addEventListener("click", enableMic);
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      micUnavailable = true;
      micButton.textContent = "Mic Unsupported";
      micButton.disabled = true;
    }

    let paused = false;
    window.addEventListener("keydown", (e)=>{
      if(e.code === "Space"){ paused = !paused; }
    });

    const shards = [];
    const SHARD_COUNT = 45;
    function initShards(){
      shards.length = 0;
      for(let i=0;i<SHARD_COUNT;i++){
        shards.push({
          x: Math.random()*W,
          y: Math.random()*H,
          r: 40 + Math.random()*100,
          a: Math.random()*Math.PI*2,
          s: 0.4 + Math.random()*0.8
        });
      }
    }
    initShards();

    let t0 = performance.now();
    function frame(now){
      requestAnimationFrame(frame);
      if(paused) return;

      const dt = Math.min(0.033, (now - t0) / 1000);
      t0 = now;

      const calm = Number(calmSlider.value) / 100;
      calmLabel.textContent = Math.round(calm*100) + "%";
      const voice = micLevel;

      ctx.fillStyle = `rgba(6,12,18,${0.14 + (1-calm)*0.08})`;
      ctx.fillRect(0,0,W,H);

      ctx.globalCompositeOperation = "lighter";
      for(const s of shards){
        const jitter = voice * 4;
        const angle = s.a + Math.sin(now*0.0003 + s.x) * 0.2;
        const r1 = s.r * (0.5 + s.s);
        const r2 = s.r * (0.2 + s.s*0.6);
        ctx.beginPath();
        ctx.moveTo(s.x + Math.cos(angle) * r1, s.y + Math.sin(angle) * r1);
        ctx.lineTo(s.x + Math.cos(angle + 1.8) * r2, s.y + Math.sin(angle + 1.8) * r2);
        ctx.lineTo(s.x + Math.cos(angle + 3.4) * r1, s.y + Math.sin(angle + 3.4) * r1);
        ctx.closePath();
        ctx.strokeStyle = `rgba(140,220,255,${0.12 + voice*0.3})`;
        ctx.lineWidth = 1 + voice*1.5;
        ctx.stroke();

        ctx.fillStyle = `rgba(160,235,255,${0.03 + voice*0.08})`;
        ctx.beginPath();
        ctx.arc(s.x + Math.sin(angle)*jitter, s.y + Math.cos(angle)*jitter, 2 + voice*3, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.globalCompositeOperation = "source-over";
    }

    ctx.fillStyle = "rgba(6,12,18,1)";
    ctx.fillRect(0,0,W,H);
    requestAnimationFrame(frame);
  </script>
</body>
</html>
