server {
  listen 80;
  server_name dev.democracyroutes.com;

  client_max_body_size 64m;
  resolver 127.0.0.11 ipv6=off valid=10s;
  resolver_timeout 2s;
  proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
  proxy_next_upstream_tries 2;

  location = /matomo.js {
    proxy_pass https://matomo.9minuti.it/matomo.js;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host matomo.9minuti.it;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Cache-Control "public, max-age=3600" always;
  }

  location = /matomo.php {
    proxy_pass https://matomo.9minuti.it/matomo.php$is_args$args;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header Host matomo.9minuti.it;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /video {
    return 301 /video/;
  }

  location /video/ {
    set $dr_video_upstream http://dr-video-dev:3120;
    rewrite ^/video/(.*)$ /$1 break;
    proxy_pass $dr_video_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }

  location /audio-api/deepgram {
    return 403;
  }

  location /audio-api/vosk {
    return 403;
  }

  location = /_admin_embed_auth {
    internal;
    set $dr_app_auth_upstream http://dr-app-dev:3115/api/admin/embed-auth;
    proxy_pass $dr_app_auth_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
  }

  location /audio-admin/deepgram/ {
    set $audio_deepgram_upstream http://audio-deepgram-dev:3000;
    auth_request /_admin_embed_auth;
    rewrite ^/audio-admin/deepgram/(.*)$ /$1 break;
    proxy_pass $audio_deepgram_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /audio-admin/deepgram {
    return 301 /audio-admin/deepgram/;
  }

  location /audio-admin/vosk/ {
    set $audio_vosk_upstream http://audio-vosk-dev:3009;
    auth_request /_admin_embed_auth;
    rewrite ^/audio-admin/vosk/(.*)$ /$1 break;
    proxy_pass $audio_vosk_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /audio-admin/vosk {
    return 301 /audio-admin/vosk/;
  }

  location /matching-admin/ {
    set $dr_matching_upstream http://dr-matching-dev:3002;
    auth_request /_admin_embed_auth;
    rewrite ^/matching-admin/(.*)$ /$1 break;
    proxy_pass $dr_matching_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /matching-admin {
    return 301 /matching-admin/;
  }

  location /thinking-admin/ {
    set $dr_thinker_upstream http://dr-thinker-dev:3001;
    auth_request /_admin_embed_auth;
    rewrite ^/thinking-admin/(.*)$ /$1 break;
    proxy_pass $dr_thinker_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /thinking-admin {
    return 301 /thinking-admin/;
  }

  location /remote-worker-app/ {
    set $dr_remote_worker_upstream http://dr-remote-worker-dev:3012;
    rewrite ^/remote-worker-app/(.*)$ /$1 break;
    proxy_pass $dr_remote_worker_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://dev.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /remote-worker-app {
    return 301 /remote-worker-app/;
  }

  location / {
    set $dr_app_upstream http://dr-app-dev:3115;
    proxy_pass $dr_app_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
