server {
  listen 80;
  server_name _;

  client_max_body_size 64m;

  # dr-video at /video
  location = /video {
    return 301 /video/;
  }

  location /video/ {
    rewrite ^/video/(.*)$ /$1 break;
    proxy_pass http://dr-video:3020;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    add_header Content-Security-Policy "frame-ancestors 'self' https://democracyroutes.com https://app.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }

  # deepgram-modular frontend + API at /audio-api/deepgram/*
  location /audio-api/deepgram {
    return 403;
  }

  # vosk-modular frontend + API at /audio-api/vosk/*
  location /audio-api/vosk {
    return 403;
  }

  # admin-only proxies for audio modular UIs
  location = /_admin_embed_auth {
    internal;
    proxy_pass http://dr-app:3015/api/admin/embed-auth;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
  }

  location /audio-admin/deepgram/ {
    auth_request /_admin_embed_auth;
    proxy_pass http://audio-deepgram:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://democracyroutes.com https://app.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /audio-admin/deepgram {
    return 301 /audio-admin/deepgram/;
  }

  location /audio-admin/vosk/ {
    auth_request /_admin_embed_auth;
    proxy_pass http://audio-vosk:3009/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://democracyroutes.com https://app.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /audio-admin/vosk {
    return 301 /audio-admin/vosk/;
  }

  # dr-matching admin frontend at /matching-admin
  location /matching-admin/ {
    auth_request /_admin_embed_auth;
    proxy_pass http://dr-matching:3002/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://democracyroutes.com https://app.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /matching-admin {
    return 301 /matching-admin/;
  }

  # dr-thinker admin frontend at /thinking-admin
  location /thinking-admin/ {
    auth_request /_admin_embed_auth;
    proxy_pass http://dr-thinker:3001/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Content-Security-Policy "frame-ancestors 'self' https://democracyroutes.com https://app.democracyroutes.com; upgrade-insecure-requests; block-all-mixed-content;" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
  location = /thinking-admin {
    return 301 /thinking-admin/;
  }

  # dr-app default
  location / {
    proxy_pass http://dr-app:3015;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
